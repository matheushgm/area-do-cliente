name: Dashboard Sync (Meta + Google → Supabase)

# Dispara: (1) a cada 30 min (cron) e (2) sob demanda — pelo botão "Atualizar"
# da dashboard (via /api/trigger-sync → workflow_dispatch) ou manualmente.
on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "incremental (padrão) ou backfill"
        required: false
        default: "incremental"
      days:
        description: "dias (só no backfill)"
        required: false
        default: "30"

# Evita rodadas concorrentes (cron + botão ao mesmo tempo).
concurrency:
  group: dashboard-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependências
        run: pip install -r sync/requirements.txt

      - name: Configurar auth do Google Ads
        run: |
          mkdir -p ~/.config/google-ads
          cat > ~/.config/google-ads/google-ads.yaml <<'YAML'
          developer_token: ${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}
          login_customer_id: "${{ secrets.GOOGLE_ADS_LOGIN_CUSTOMER_ID }}"
          client_id: ${{ secrets.GOOGLE_ADS_CLIENT_ID }}
          client_secret: ${{ secrets.GOOGLE_ADS_CLIENT_SECRET }}
          refresh_token: ${{ secrets.GOOGLE_ADS_REFRESH_TOKEN }}
          use_proto_plus: True
          YAML

      - name: Rodar sync
        working-directory: sync
        env:
          META_TOKEN: ${{ secrets.META_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          GOOGLE_MCC_ID: ${{ secrets.GOOGLE_ADS_LOGIN_CUSTOMER_ID }}
        run: |
          if [ "${{ github.event.inputs.mode }}" = "backfill" ]; then
            python sync.py --backfill --days "${{ github.event.inputs.days }}" --sink supabase
          else
            python sync.py --incremental --sink supabase
          fi

<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dashboard API — Tráfego (replica)</title>
<link rel="stylesheet" href="./vendor/dashboard.css">
<!-- Chart.js (UMD local, sem CDN) — usado pela aba "Resultados" -->
<script src="./vendor/chart.umd.min.js"></script>
<style>
  /* Fundo CLARO (igual ao dashboard oficial). .dt-root é transparente e herda
     daqui — os elementos com fundo semi-transparente (barras de status) só ficam
     legíveis sobre fundo claro. */
  body { margin:0; background:#EEF2F9; }
  .api-banner { background:#FFFFFF; color:#64748B; font-size:12px;
    padding:7px 20px; border-bottom:1px solid #D8E0F0; display:flex; gap:10px; align-items:center; }
  .api-banner b { color:#164496; }
  .api-dot { width:8px; height:8px; border-radius:50%; background:#22c55e; box-shadow:0 0 6px #22c55e; }
  /* Modal da mensagem semanal (autocontido) */
  .wk-overlay { position:fixed; inset:0; background:rgba(15,23,42,.55); display:flex;
    align-items:center; justify-content:center; z-index:1000; padding:20px; }
  .wk-modal { background:#fff; border-radius:14px; width:min(680px,100%); max-height:86vh;
    display:flex; flex-direction:column; box-shadow:0 20px 60px rgba(0,0,0,.3); overflow:hidden; }
  .wk-head { display:flex; align-items:center; justify-content:space-between; padding:16px 20px;
    border-bottom:1px solid #E4EAF7; }
  .wk-head h3 { margin:0; font-size:16px; color:#0f2a5e; }
  .wk-head .wk-x { cursor:pointer; border:0; background:none; font-size:20px; color:#94A3B8; }
  .wk-body { padding:16px 20px; overflow:auto; }
  .wk-body textarea { width:100%; min-height:300px; border:1px solid #D8E0F0; border-radius:10px;
    padding:12px; font:13px/1.5 ui-monospace,Menlo,monospace; color:#334155; resize:vertical; box-sizing:border-box; }
  .wk-foot { display:flex; gap:10px; justify-content:flex-end; padding:14px 20px; border-top:1px solid #E4EAF7; }
  /* Ícone de info ao lado do status (explica a regra da classificação) */
  .status-info { display:inline-flex; align-items:center; justify-content:center; width:14px; height:14px;
    margin-left:5px; border-radius:50%; border:1px solid #94A3B8; color:#64748B; background:#fff;
    font:700 9px/1 ui-sans-serif,system-ui; cursor:help; vertical-align:middle; user-select:none; }
  .status-info:hover { border-color:#164496; color:#164496; }
  /* Botão de olho: ocultar/reexibir conta do dashboard (clientes que saíram) */
  .dt-root .hide-btn { display:inline-flex; align-items:center; justify-content:center; margin-left:6px;
    padding:2px; border:0; background:transparent; color:#94A3B8; cursor:pointer; border-radius:6px;
    vertical-align:middle; transition:color .15s, background .15s; }
  .dt-root .hide-btn:hover { color:#2563EB; background:#EEF4FF; }
  .dt-root .hide-btn.is-hidden { color:#2563EB; }
  /* Dica de leitura dos grupos das visualizações analíticas */
  .dt-root .diag-hint { font-size:12px; color:#64748B; padding:8px 12px 2px; line-height:1.4; }

  /* Subgrupos de causa dentro do grupo "Queda" (visão Padrão) — subclassifica
     as contas em queda pela causa (verba / CTR / taxa de conversão), reusando
     a lógica do Diagnóstico de Queda já na primeira parte da lista. */
  .dt-root .queda-sub { margin:0 0 4px; }
  .dt-root .queda-sub:last-child { margin-bottom:0; }
  .dt-root .subgroup-header { display:flex; align-items:center; gap:8px; padding:6px 12px; margin:2px 0 11px;
    border-radius:8px; border:1px solid #E4EAF7; border-left:3px solid #CBD5E1; background:#F8FAFF; }
  .dt-root .subgroup-header .gh-icon { font-size:13px; }
  .dt-root .sg-title { font-size:12px; font-weight:700; color:#334155; }
  .dt-root .subgroup-header.causa-verba { border-left-color:#D97706; background:rgba(217,119,6,0.06); }
  .dt-root .subgroup-header.causa-ctr   { border-left-color:#DC2626; background:rgba(220,38,38,0.05); }
  .dt-root .subgroup-header.causa-taxa  { border-left-color:#DB2777; background:rgba(219,39,119,0.05); }

  /* Variação discreta vs período anterior nas tabelas de drill (campanha/conjunto/anúncio) */
  .dt-root .var-mini { font-size:10px; font-weight:700; margin-left:5px; white-space:nowrap;
    vertical-align:middle; letter-spacing:.2px; opacity:.9; }
  .dt-root .var-mini.up  { color:#059669; }
  .dt-root .var-mini.dn  { color:#DC2626; }
  .dt-root .var-mini.fl  { color:#94A3B8; font-weight:600; }
  .dt-root .var-mini.new { color:#2563EB; font-weight:600; }

  /* ── MOBILE: cards no lugar das tabelas ────────────────────────────────────
     No retrato o dashboard.css esconde `.group-section .table-wrap` e espera a
     lista `.mcl`, que nunca foi portada para o viewer — o resultado era um grupo
     de status sem NENHUM dado, e só girar o celular (>768px) trazia a tabela de
     volta. Aqui entram os cards `.m-card`: uma conta por card, com as 3 métricas
     que importam (conversões, CPL, investimento) já com a variação vs. período
     anterior. Desktop nunca vê isso (a tabela completa continua sendo a visão). */
  .dt-root .m-cards { display:none; }
  /* No desktop a busca e o select seguem sendo filhos diretos da .filter-bar
     (display:contents dissolve o wrapper); só no mobile ele vira uma linha. */
  .dt-root .filter-row { display:contents; }
  /* Subtabs sangram até a borda do painel: o recuo negativo precisa acompanhar
     o padding do .cp-panel (era inline com -22px fixo e estourava a tela quando
     o painel encolheu no mobile). */
  .dt-root .dt-subtabs { display:flex; border-bottom:1px solid #D8E0F0; background:#FFFFFF;
    margin:0 -22px 18px; padding:0 22px; }
  .dt-root .m-card { background:#FFFFFF; border:1px solid #D8E0F0; border-radius:12px; padding:12px 13px;
    box-shadow:0 1px 3px rgba(15,23,42,.06), 0 4px 14px rgba(15,23,42,.05); cursor:pointer;
    -webkit-tap-highlight-color:transparent; }
  .dt-root .m-card:active { background:#F4F7FC; }
  .dt-root .m-card-top { display:flex; align-items:center; gap:7px; }
  .dt-root .m-card-name { font-size:14px; font-weight:700; color:#0F172A; flex:1; min-width:0;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .dt-root .m-card-chev { color:#94A3B8; font-size:16px; flex-shrink:0; line-height:1; }
  .dt-root .m-card-sub { display:flex; align-items:center; gap:8px; flex-wrap:wrap; font-size:11px;
    color:#64748B; margin-top:7px; }
  .dt-root .m-card-sub .squad-derived-sm { margin-top:0; }
  /* Grade de métricas: 3 colunas fixas — cabem em 375px sem estourar */
  .dt-root .m-grid { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:1px;
    background:#E4EAF7; border:1px solid #E4EAF7; border-radius:9px; overflow:hidden; margin-top:10px; }
  .dt-root .m-cell { background:#F8FAFF; padding:8px 9px; min-width:0; }
  .dt-root .m-cell-l { font-size:9px; font-weight:700; letter-spacing:.4px; text-transform:uppercase;
    color:#64748B; margin-bottom:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .dt-root .m-cell-v { font-size:15px; font-weight:800; color:#0F172A; line-height:1.15;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .dt-root .m-cell-d { font-size:10px; font-weight:700; margin-top:3px; white-space:nowrap;
    overflow:hidden; text-overflow:ellipsis; }
  @media(max-width:768px){
    .dt-root .m-cards { display:flex; flex-direction:column; gap:10px; margin-bottom:24px; }
    /* Diagnóstico/escala também viram cards — nada de scroll horizontal. */
    .dt-root .group-section.diag-section .table-wrap { display:none; }
    /* 5 KPIs em 2 colunas deixavam uma célula vazia; a última ocupa a linha. */
    .dt-root .summary-bar .sum-kpi:last-child { grid-column:1 / -1; border-right:none; }

    /* ── Enxugar o topo ──────────────────────────────────────────────────────
       Somados, banner + header + filtros + KPIs + badges ocupavam 766px numa
       tela de 812px: a primeira tela não mostrava nenhuma conta. Aqui o topo
       cabe em ~450px e o primeiro card já aparece sem rolar. */
    /* Banner: fica só o essencial (fonte dos dados + status de sync); a frase
       explicativa longa empurrava o #sync-status para fora da tela. */
    .api-banner { padding:5px 14px; font-size:10px; gap:6px; white-space:nowrap; }
    .api-banner .banner-desc { display:none; }
    /* A faixa de presets rola sozinha; sem min-width:0 ela força 504px de
       largura e passa a rolar a PÁGINA inteira na horizontal. */
    .dt-root .presets { width:100%; min-width:0; max-width:100%; }
    .dt-root .summary-bar { margin-bottom:12px; }
    .dt-root .sum-kpi { padding:9px 12px; }
    .dt-root .sum-label { font-size:9px; margin-bottom:4px; }
    .dt-root .sum-value { font-size:17px; }
    .dt-root .sum-sub { font-size:10px; margin-top:2px; }
    /* Busca e squad lado a lado em vez de empilhados. */
    .dt-root .filter-bar { gap:8px; padding:8px 16px; }
    .dt-root .filter-row { display:flex; gap:8px; align-items:center; width:100%; }
    .dt-root .filter-row .search-wrap { flex:1; min-width:0; }
    .dt-root .filter-row select { flex-shrink:0; max-width:42%; }
    .dt-root .period-row { gap:6px; margin-bottom:12px; }
    .dt-root .period-badge { font-size:10px; padding:3px 8px; }
    .dt-root .tab-panel { padding:12px 16px; }
    /* Barra de visualizações: faixa rolável em vez de 4 linhas empilhadas. */
    .dt-root .squad-bar { flex-wrap:nowrap; overflow-x:auto; -webkit-overflow-scrolling:touch;
      scrollbar-width:none; }
    .dt-root .squad-bar::-webkit-scrollbar { display:none; }
    .dt-root .squad-bar .squad-btn { flex-shrink:0; }
    /* ── Página do cliente ───────────────────────────────────────────────── */
    /* O nome ficava espremido entre o "Voltar" e os badges e truncava já no
       3º caractere ("Grup…"); no mobile ele ganha a linha inteira. */
    .dt-root .cp-client-name { flex:1 0 100%; order:-1; font-size:16px; }
    .dt-root .cp-header { padding:12px 16px; gap:9px; }
    /* KPIs em grade de 2 colunas: a faixa rolável escondia metade dos números
       (o CPL Alvo e o Δ vs Alvo só apareciam arrastando de lado). */
    .dt-root .cp-kpi-bar { display:grid; grid-template-columns:1fr 1fr; overflow-x:visible; }
    .dt-root .cp-kpi-item { min-width:0; padding:10px 14px; border-bottom:1px solid #E4EAF7; }
    .dt-root .cp-kpi-item:nth-child(odd) { border-right:1px solid #E4EAF7; }
    .dt-root .cp-kpi-item:last-child { border-right:none; }
    .dt-root .cp-kpi-value { font-size:16px; }
    .dt-root .cp-kpi-label, .dt-root .cp-kpi-sub { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .dt-root .cp-panel { padding:14px 16px; }
    .dt-root .dt-subtabs { margin:0 -16px 14px; padding:0 16px; overflow-x:auto;
      -webkit-overflow-scrolling:touch; scrollbar-width:none; }
    .dt-root .dt-subtabs::-webkit-scrollbar { display:none; }
    .dt-root .dt-subtabs .dtab { flex-shrink:0; }
    /* Tabelas profundas da página do cliente (campanhas/anúncios): a 1ª coluna
       fica fixa, então dá pra rolar as métricas sem perder de vista o nome. */
    .dt-root .dt-wrap th:first-child, .dt-root .dt-wrap td:first-child { position:sticky; left:0; z-index:2;
      background:#FFFFFF; box-shadow:1px 0 0 #E4EAF7; }
    .dt-root .dt-wrap thead th:first-child { background:#F4F7FC; z-index:3; }
    .dt-root .dt-wrap tr:hover td:first-child { background:#F4F7FC; }
    .dt-root .ad-name { max-width:150px; }
  }
  /* Mini-gráfico dentro de cada quadrante (aba Resultados) */
  .dt-root .mg-chart { position:relative; height:170px; margin-top:14px; padding-top:14px; border-top:1px solid #E4EAF7; }
  .dt-root .mg-chart canvas { width:100% !important; }
  /* Rótulo de escopo dos quadrantes na aba Campanhas */
  .cp-quad-scope { font-size:12px; font-weight:700; color:#475569; margin:0 0 10px;

  /* Célula de nome do anúncio: nome trunca, botão "Ver" fica sempre visível */
  .dt-root .ad-name .ad-name-flex { display:flex; align-items:center; gap:8px; }
  .dt-root .ad-name .ad-name-txt { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; min-width:0; }
  /* Botões "Ver" / "Destino" na tabela de anúncios */

    background:#fff; color:#164496; font:700 11px/1 ui-sans-serif,system-ui; cursor:pointer;
    white-space:nowrap; vertical-align:middle; }
  .ad-prev-btn:hover, .ad-dest-btn:hover { background:#164496; color:#fff; border-color:#164496; }
  /* Modal de destino do anúncio */
  .adp-dest { padding:16px 18px; display:flex; flex-direction:column; gap:12px; }
  .adp-dest-row { display:flex; flex-direction:column; gap:3px; }
  .adp-dest-k { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.03em; color:#94A3B8; }
  .adp-dest-v { font-size:13px; color:#334155; word-break:break-all; }
  .adp-dest-v a { color:#164496; font-weight:600; }
  /* Modal de preview do anúncio */
  .adp-overlay { position:fixed; inset:0; background:rgba(15,23,42,.55); display:flex;
    align-items:center; justify-content:center; z-index:1100; padding:20px; }
  .adp-modal { background:#fff; border-radius:14px; width:min(440px,100%); max-height:90vh;
    display:flex; flex-direction:column; box-shadow:0 20px 60px rgba(0,0,0,.3); overflow:hidden; }
  .adp-head { display:flex; align-items:center; justify-content:space-between; gap:10px;
    padding:14px 18px; border-bottom:1px solid #E4EAF7; }
  .adp-head h3 { margin:0; font-size:14px; color:#0f2a5e; white-space:nowrap; overflow:hidden;
    text-overflow:ellipsis; }
  .adp-head .adp-x { cursor:pointer; border:0; background:none; font-size:18px; color:#94A3B8; }
  .adp-tabs { display:flex; gap:6px; flex-wrap:wrap; padding:10px 18px; border-bottom:1px solid #E4EAF7; }
  .adp-fmt { padding:4px 10px; border:1px solid #D8E0F0; border-radius:8px; background:#fff;
    color:#475569; font:600 11px/1 ui-sans-serif,system-ui; cursor:pointer; }
  .adp-fmt.active { background:#164496; color:#fff; border-color:#164496; }
  .adp-body { padding:14px 18px; overflow:auto; min-height:360px; display:flex;
    align-items:center; justify-content:center; background:#F1F5FB; }
  .adp-frame { width:100%; height:540px; border:0; background:#fff; border-radius:10px; }
  .adp-loading, .adp-msg { text-align:center; color:#64748B; font-size:13px; padding:24px; }
  .adp-save { display:flex; flex-wrap:wrap; align-items:center; gap:8px; padding:12px 18px; border-top:1px solid #E4EAF7; }
  .adp-save select { flex:1; min-width:160px; padding:6px 10px; border:1px solid #D8E0F0; border-radius:8px;
    font:600 12px/1.2 ui-sans-serif,system-ui; color:#334155; background:#fff; }
  .adp-save button { padding:6px 12px; border:0; border-radius:8px; background:#164496; color:#fff;
    font:700 12px/1 ui-sans-serif,system-ui; cursor:pointer; white-space:nowrap; }
  .adp-save button:disabled { opacity:.6; cursor:default; }
  .adp-save-dates { flex-basis:100%; font-size:12px; font-weight:600; color:#475569; display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
  .adp-save-dates input { padding:4px 8px; border:1px solid #D8E0F0; border-radius:7px; font:600 12px/1 ui-sans-serif,system-ui; color:#334155; }
  .adp-save-msg { flex-basis:100%; font-size:12px; color:#64748B; }
  .adp-save-msg.ok { color:#059669; font-weight:600; }
  .adp-save-msg.err { color:#DC2626; font-weight:600; }
  .adp-trans { display:flex; flex-wrap:wrap; align-items:center; gap:8px; padding:12px 18px; border-top:1px solid #E4EAF7; }
  .adp-trans button { padding:6px 12px; border:0; border-radius:8px; background:#7C3AED; color:#fff; font:600 13px/1 ui-sans-serif,system-ui; cursor:pointer; }

  .adp-trans button.save { background:#164496; }
  .adp-trans-text { flex-basis:100%; min-height:120px; resize:vertical; padding:10px 12px; border:1px solid #D8E0F0; border-radius:8px;
    font:400 13px/1.5 ui-sans-serif,system-ui; color:#1E293B; background:#F8FAFF; }
</style>

<body>
<div class="api-banner"><span class="api-dot"></span> <span class="banner-desc">Fonte: <b>API Meta + Google</b> via Supabase (autenticado) · atualiza a cada 30 min.</span> <span id="src-info"></span><span id="sync-status" style="margin-left:auto;font-weight:700"></span></div>
<div class="dt-root" id="app"><div class="dt-loader"><div class="spinner"></div><p>Carregando dados da API…</p></div></div>

<script type="module">
import {
  CFG, parseCSV, num, fmtMoney, fmtNum, fmtPct, fmtBR, inRange, fmtDate, addDays,
  buildPeriod, periodFromDays, maxDate, pillCls, pillIco, varCls, buildStats,
  computeMainPeriod, groupBy, statusTagInfo, buildWeeklyMessage,
  buildDeclineDiagnosis, buildScaleCandidates,
} from './vendor/dashboardData.js'

// ─── Fonte de dados ──────────────────────────────────────────────────────────
// Em produção (dentro da Área do Cliente): busca pelo endpoint AUTENTICADO
// /api/dash-data, enviando o token da sessão Supabase (mesma origem → mesmo
// localStorage). Em dev standalone (sem sessão): cai nos CSVs locais ./output/.
const LOCAL = { meta: './output/meta.csv', google: './output/google.csv', google_terms: './output/google_terms.csv' }

// Supabase (chaves publishable — públicas por design, mesmas expostas ao browser
// pelo app React). Usadas para puxar os metadados de conta das views *_public:
// CPL alvo, squad, projeto vinculado (Área do Cliente) e pasta ClickUp.
const SB_URL = 'https://dwbdzoljmdmihitssxhn.supabase.co'
const SB_KEY = 'sb_publishable_ukbzUmT2uoD4BCnWT11Vhg_NJcAVIpT'

function supabaseToken() {
  try {
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i)
      if (/^sb-.*-auth-token$/.test(k)) {
        const v = JSON.parse(localStorage.getItem(k))
        const t = v?.access_token || v?.currentSession?.access_token || v?.session?.access_token
        if (t) return t
      }
    }
  } catch (e) { /* ignore */ }
  return null
}

async function fetchChannel(ch) {
  // Modo compartilhado: só o canal do link, via endpoint público (sem login).
  if (SHARED) {
    if (ch !== SHARED.channel) return ''
    const r = await fetch(`/api/dash-public?cliente=${encodeURIComponent(SHARED.client)}&canal=${SHARED.channel}&t=${encodeURIComponent(SHARED.token)}`)
    if (!r.ok) throw new Error(`HTTP ${r.status}`)
    return r.text()
  }
  const token = supabaseToken()
  if (token) {
    const r = await fetch(`/api/dash-data?channel=${ch}`, { headers: { Authorization: `Bearer ${token}` } })
    if (!r.ok) throw new Error(`${ch}: HTTP ${r.status}`)
    return r.text()
  }
  // dev local (standalone, sem sessão)
  const r = await fetch(LOCAL[ch])
  return r.ok ? r.text() : ''
}

// Termos de pesquisa do Google: lazy e FILTRADO por conta (payload pequeno).
// Em produção usa /api/dash-data?channel=google_terms&account=<conta>; em dev
// (sem sessão) cai no CSV local completo e o chamador filtra a conta.
async function fetchGoogleTerms(account) {
  const token = supabaseToken()
  if (token) {
    const r = await fetch(`/api/dash-data?channel=google_terms&account=${encodeURIComponent(account)}`,
      { headers: { Authorization: `Bearer ${token}` } })
    if (!r.ok) throw new Error(`termos: HTTP ${r.status}`)
    return r.text()
  }
  const r = await fetch(LOCAL.google_terms)
  return r.ok ? r.text() : ''
}

// Metadados de conta: espelha o `accounts` de useDashboardData (deriva do projeto
// vinculado; squad/clickup/CPL vêm do projeto, com override na própria conta).
async function fetchAccounts() {
  const headers = { apikey: SB_KEY, Authorization: `Bearer ${supabaseToken() || SB_KEY}` }
  const get = async (path) => {
    try { const r = await fetch(`${SB_URL}/rest/v1/${path}`, { headers }); return r.ok ? r.json() : [] }
    catch { return [] }
  }
  const [acc, proj, cpl, sq] = await Promise.all([
    get('dashboard_accounts_public?select=account_name,project_id,squad_id,clickup_folder_id,hidden'),
    get('dashboard_projects_public?select=id,company_name,squad_name,clickup_folder_id'),
    get('cpl_targets_public?select=company_name,cpl_target'),
    get('dashboard_squads_public?select=id,name'),
  ])
  const projById = {}; proj.forEach(p => { projById[p.id] = p })
  const sqById = {}; sq.forEach(s => { sqById[s.id] = s.name })
  const cplBy = {}; cpl.forEach(r => { const n = r.company_name?.trim(); if (n && r.cpl_target != null) cplBy[n] = parseFloat(r.cpl_target) })
  const out = {}
  acc.forEach(row => {
    const project = row.project_id ? projById[row.project_id] : null
    const acCompanyName = project?.company_name ?? null
    const squad = (row.squad_id ? sqById[row.squad_id] : null) ?? project?.squad_name ?? null
    const clickupFolderId = row.clickup_folder_id ?? project?.clickup_folder_id ?? null
    const cplVal = acCompanyName != null ? cplBy[acCompanyName] : null
    out[row.account_name] = {
      acCompanyName, squad, clickupFolderId,
      projectId: row.project_id || null,
      hidden: !!row.hidden,
      cplTarget: cplVal != null ? { value: cplVal, acName: acCompanyName } : null,
    }
  })
  return out
}

async function load() {
  try {
    const [m, g, accounts] = await Promise.all([fetchChannel('meta'), fetchChannel('google'), fetchAccounts()])
    state.raw = { meta: parseCSV(m), google: parseCSV(g) }
    state.accounts = accounts
    document.getElementById('src-info').textContent =
      `· ${state.raw.meta.length} linhas Meta · ${state.raw.google.length} linhas Google`
    if (SHARED) {
      state.channel = SHARED.channel
      state.openClient = { client: SHARED.client, channel: SHARED.channel }
    } else if (!state._navRestored) { restoreNav(); state._navRestored = true }
    render()
  } catch (e) {
    app.innerHTML = SHARED
      ? `<div class="dt-loader"><p>Não foi possível abrir este dashboard.<br>O link pode estar incorreto ou ter expirado.</p></div>`
      : `<div class="dt-loader"><p>Erro ao carregar dados: ${esc(e.message)}.<br>Faça login na Área do Cliente e recarregue.</p></div>`
  }
}

function setStatus(msg, isErr) {
  const el = document.getElementById('sync-status')

}

// Botão "Atualizar": dispara o GitHub Action (coleta na nuvem) e recarrega os
// dados algumas vezes até o resultado chegar (~1-2 min).
async function triggerSync() {
  const token = supabaseToken()
  if (!token) { setStatus('Faça login para atualizar.', true); return }
  setStatus('⏳ Disparando atualização…')
  try {
    const r = await fetch('/api/trigger-sync', { method: 'POST', headers: { Authorization: `Bearer ${token}` } })
    if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.error?.message || ('HTTP ' + r.status)) }
  } catch (e) { setStatus('❌ ' + e.message, true); return }
  setStatus('⏳ Coletando na nuvem (~1-2 min)… os números atualizam sozinhos aqui.')
  let n = 0
  const tick = async () => {
    n++
    await load()
    if (n < 8) { setStatus(`⏳ Atualizando… (${n}/8)`); setTimeout(tick, 18000) }
    else { setStatus('✅ Atualização concluída.'); setTimeout(() => setStatus(''), 6000) }
  }
  setTimeout(tick, 25000)
}

// ─── Contas ocultas + visualizações analíticas (diagnóstico / escala) ─────────
function isHidden(name) { return !!state.accounts[name]?.hidden }

// Grava o oculto/reexibido em dashboard_accounts (mesma tabela que o app React
// usa p/ squad override). Otimista: atualiza o estado local e re-renderiza já.
async function setHidden(name, hidden) {
  state.accounts[name] = { ...(state.accounts[name] || {}), hidden }
  render()
  const token = supabaseToken()
  if (!token) { setStatus('Faça login para ocultar contas.', true); return }
  try {
    const r = await fetch(`${SB_URL}/rest/v1/dashboard_accounts?on_conflict=account_name`, {
      method: 'POST',
      headers: { apikey: SB_KEY, Authorization: `Bearer ${token}`, 'Content-Type': 'application/json',
                 Prefer: 'resolution=merge-duplicates,return=minimal' },
      body: JSON.stringify({ account_name: name, hidden, updated_at: new Date().toISOString() }),
    })
    if (!r.ok) throw new Error('HTTP ' + r.status)
  } catch (e) { setStatus('❌ Não foi possível salvar a conta oculta: ' + e.message, true) }
}

// Squads distintos com pelo menos uma conta com dados no canal/período (alimenta o dropdown).
function squadsInChannel(ch, p) {
  if (!p) return []

  buildStats(state.raw[ch], cfgFor(ch), p).forEach(s => {
    const sq = state.accounts[s.name]?.squad

// ─── Barra de resumo (espelha ChannelSection.useMemo) ────────────────────────
function summaryFor(ch, p) {
  if (!p) return null
  const isMeta = ch === 'meta'
  const rows = state.raw[ch].filter(r => inRange(fmtDate(r[CFG[ch].dateKey]), p.p1s, p.p1e))
  let sumSpend=0, sumLeads=0, sumClicks=0, sumImpr=0, sumConv=0
  if (isMeta) rows.forEach(r => {
    sumSpend += num(r['Valor investido'])
    sumLeads += num(r['Conversões'])   // total da conta = só conversões reais
    sumClicks += num(r['Número de cliques no link']); sumImpr += num(r['Impressões'])
  })
  else rows.forEach(r => {
    sumSpend += num(r['Gasto']); sumConv += num(r['Conversões'])
    sumClicks += (num(r['CLiques'])||num(r['Cliques']))
    sumImpr += (num(r['Impressões na parte superior'])||num(r['Impressões']))
  })
  if (!isMeta) sumLeads = sumConv
  return { sumSpend, sumLeads, sumImpr, sumClicks,
    cpl: sumLeads>0?sumSpend/sumLeads:null,
    ctr: sumImpr>0?(sumClicks/sumImpr)*100:null,
    txConv: sumClicks>0?(sumLeads/sumClicks)*100:null }
}

const NAV_KEY = 'rl_dashteste_nav'
function saveNav() {
  if (SHARED) return
  try {
    localStorage.setItem(NAV_KEY, JSON.stringify({
      channel: state.channel, days: state.days, from: state.from, to: state.to, search: state.search, squad: state.squad,
      view: state.view, showHidden: state.showHidden,
      openClient: state.openClient, tab: state.tab, sub: state.sub,
      drillCampaign: state.drillCampaign, drillAdset: state.drillAdset,
      cDays: state.cDays, cFrom: state.cFrom, cTo: state.cTo, campFilter: state.campFilter,
    }))
  } catch (e) { /* ignore (modo privado etc.) */ }
}
function restoreNav() {
  try {
    const s = JSON.parse(localStorage.getItem(NAV_KEY) || 'null'); if (!s) return
    if (s.channel) state.channel = s.channel
    if (s.days != null) state.days = s.days
    state.from = s.from || ''; state.to = s.to || ''; state.search = s.search || ''; state.squad = s.squad || ''
    state.view = ['padrao','diagnostico','escala','queda-ctr','queda-taxa'].includes(s.view) ? s.view : 'padrao'
    state.showHidden = !!s.showHidden
    if (s.openClient && s.openClient.client) {
      // Só restaura o cliente se a conta ainda existir nos dados carregados.
      const ch = s.openClient.channel || state.channel
      const exists = (state.raw[ch] || []).some(r => (r[CFG[ch].accountKey] || '').trim() === s.openClient.client)
      if (exists) {
        state.openClient = s.openClient
        state.tab = s.tab || 'resultados'; state.sub = s.sub || 0
        state.drillCampaign = s.drillCampaign || null; state.drillAdset = s.drillAdset || null
        state.cDays = s.cDays != null ? s.cDays : 7; state.cFrom = s.cFrom || ''; state.cTo = s.cTo || ''
        state.campFilter = Array.isArray(s.campFilter) ? s.campFilter : []
        state.cPeriod = null
      }
    }
  } catch (e) { /* ignore */ }
}

// Dinheiro nos cards: a célula tem ~105px, onde "R$ 2629,63" já trunca. CPL fica

// ─── Ordenação das tabelas de conta ──────────────────────────────────────────
// Cada coluna com `key` vira cabeçalho clicável (1º clique ordena, o seguinte
// inverte). `null` = coluna não ordenável (Status é constante dentro do grupo).
// A ordenação vale para os 4 grupos de status e também para os cards mobile.
const ACCT_COLS = [
  ['Conta','name'], ['Status',null],
  ['Conv.','conv1'], ['Conv. Ant.','conv2'], ['Var. Conv.','varConv'],
  ['CPL','cpl1'], ['CPL Ant.','cpl2'], ['Var. CPL','varCpl'],
  ['Investimento','spend1'], ['Invest. Ant.','spend2'], ['Var. Invest.','varSpend'],
  ['Tend. 3d','trend'],
]
// Tendência não é um número na linha — vira rank (queda < estável < alta).
const acctVal = (x, key) => key==='trend' ? (x.declining3d?-1:x.trendDir==='up'?1:0) : x[key]
function sortAccounts(list) {
  const { key, dir } = state.acctSort
  if (!key) return list
  const s = dir==='asc'?1:-1
  return list.slice().sort((a,b)=>{
    if (key==='name') return s*String(a.name).localeCompare(String(b.name),'pt-BR')
    const av = acctVal(a,key), bv = acctVal(b,key)
    if (av==null && bv==null) return 0
    if (av==null) return 1      // nulos sempre por último, em qualquer direção
    if (bv==null) return -1
    return s*(av-bv)
  })
}

      <td>${fmtMoney(x.cpl1)}</td><td>${fmtMoney(x.cpl2)}</td>
      <td class="${varCls(x.varCpl,true)}">${fmtPct(x.varCpl)}</td>

      <td class="${varCls(x.varSpend,false)}">${fmtPct(x.varSpend)}</td>

    }
    return `<div class="group-section">${header}${acctTable(grp)}</div>`
  }).join('')
  return summary + groups

const stTag = s => { const i = statusTagInfo(s); return i ? `<span class="status-tag ${i.cls}">${esc(i.label)}</span>` : '—' }
const convCell = (conv,spend) => (spend>0 && conv===0) ? `<span class="crit">0 🚨</span>` : fmtNum(conv)
const ctrCell = v => v==null ? '—' : `<span class="${v<1?'warn':'good'}">${v.toFixed(2)}%</span>`
const txCell = (conv,clicks) => { if(!clicks) return '—'; const r=conv/clicks*100; return `<span class="${r>=5?'good':r>=1?'warn':'crit'}">${r.toFixed(1)}%</span>` }

const pctVid = (p,vv) => vv>0 ? (p/vv*100).toFixed(0)+'%' : '—'

const metaConv = r => num(r['Conversões'])     // só conversões reais (total da conta)
const metaResult = r => num(r['Resultados'])   // resultado verdadeiro do objetivo (por campanha)
// Soma uma métrica do período anterior agrupada por chave → { chave: total }.
// Usado pelas tabelas de drill para comparar campanha/conjunto/anúncio 1:1.
const prevMapOf = (prevRows, keyFn, valFn) => {
  const m = {}
  ;(prevRows || []).forEach(r => { const k = keyFn(r); if (k == null || k === '') return; m[k] = (m[k] || 0) + valFn(r) })
  return m
}
// Badge discreto de variação vs período anterior (para conversões/resultados —
// maior é melhor). Sem barulho: ±0% quando estável, "novo" quando não existia
// no período anterior, nada quando era 0 e continua 0.
function varMini(cur, prev) {
  const c = cur || 0, p = prev || 0
  if (p === 0) return c > 0 ? `<span class="var-mini new" title="Sem resultado no período anterior">novo</span>` : ''
  const pct = ((c - p) / p) * 100
  if (Math.abs(pct) < 0.5) return `<span class="var-mini fl" title="Anterior: ${fmtNum(p)}">±0%</span>`
  const cls = pct > 0 ? 'up' : 'dn', arrow = pct > 0 ? '▲' : '▼'
  return `<span class="var-mini ${cls}" title="Anterior: ${fmtNum(p)} · atual: ${fmtNum(c)}">${arrow} ${Math.abs(pct).toFixed(0)}%</span>`
}

const AD_PREVIEW_FORMATS = [
  ['Feed mobile','MOBILE_FEED_STANDARD'], ['Feed desktop','DESKTOP_FEED_STANDARD'],

const BANCO_FUNIS = ['Funil de Webinar','Funil de Aplicação','Funil de Diagnóstico','Funil de E-commerce (Venda Direta)','Funil de Webinar Pago','Funil de Isca Digital','Funil de VSL','Funil de Quiz','Lançamento','Funil de Desafio','Funil Win-Your-Money-Back']
// Métricas do criativo (por ad_id) num período: CTR no link, taxa de conversão
// e hook rate (3s ÷ exibições). Usadas ao salvar no Banco de Anúncios.
function adMetricsForRange(adId, from, to){
  const rows = (state.raw['meta'] || []).filter(r => (r['ad_id'] || '') === adId && inRange(fmtDate(r['Dia']), from, to))
  const imp = rows.reduce((a,r)=>a+num(r['Impressões']),0)
  const clk = rows.reduce((a,r)=>a+num(r['Número de cliques no link']),0)
  const conv = rows.reduce((a,r)=>a+num(r['Conversões']),0)
  const h3 = rows.reduce((a,r)=>a+num(r['Número de vezes que assistiram os 3 primeiros segundos']),0)
  const vv = rows.reduce((a,r)=>a+num(r['Número de vezes que o vídeo foi exibido']),0)
  const spend = rows.reduce((a,r)=>a+num(r['Valor investido']),0)
  const leads = rows.reduce((a,r)=>a+num(r['Leads']),0)
  const purchases = rows.reduce((a,r)=>a+num(r['Número de vendas']),0)
  return {
    ctr_link: imp>0 ? +(clk/imp*100).toFixed(2) : null,
    conv_rate: clk>0 ? +(conv/clk*100).toFixed(2) : null,
    hook_rate: vv>0 ? +(h3/vv*100).toFixed(2) : null,
    conversions: conv, leads, purchases,
    spend: +spend.toFixed(2),
    cost_per_conv: conv>0 ? +(spend/conv).toFixed(2) : null,
  }
}

    <div class="adp-body" id="adpBody"></div>
    ${SHARED ? '' : `<div class="adp-save">
      <div class="adp-save-dates">📅 Dados de <input type="date" id="adpFrom" value="${pf}"> até <input type="date" id="adpTo" value="${pt}"></div>
      <select id="adpFunil"><option value="">Salvar no Banco — selecione o funil…</option>${BANCO_FUNIS.map(f=>`<option value="${esc(f)}">${esc(f)}</option>`).join('')}</select>
      <button id="adpSaveBtn">💾 Salvar no Banco</button>
      <span id="adpSaveMsg" class="adp-save-msg"></span>
    </div>
    <div class="adp-trans">
      <button id="adpTransBtn">📝 Transcrever vídeo</button>
      <span id="adpTransMsg" class="adp-save-msg"></span>
      <textarea id="adpTransText" class="adp-trans-text" style="display:none" placeholder="Transcrição do vídeo…"></textarea>
      <button id="adpTransSave" class="save" style="display:none">💾 Salvar em Roteiros Validados</button>
    </div>`}
  </div>`
  document.body.appendChild(ov)
  ov.addEventListener('click', e=>{ if(e.target===ov) ov.remove() })
  ov.querySelector('#adpClose').onclick = ()=>ov.remove()
  const bodyEl = ov.querySelector('#adpBody')
  const load = async (fmt)=>{
    bodyEl.innerHTML = `<div class="adp-loading"><div class="spinner"></div><p>Carregando preview…</p></div>`
    // No link compartilhado não há sessão: usa /api/ad-preview-public, que valida
    // o token HMAC do link e confere que o ad_id é mesmo da conta antes de gerar.
    let url, opts = {}
    if(SHARED){
      url = `/api/ad-preview-public?cliente=${encodeURIComponent(SHARED.client)}&canal=${SHARED.channel}`
          + `&t=${encodeURIComponent(SHARED.token)}&ad_id=${encodeURIComponent(adId)}&format=${fmt}`
    } else {
      const token = supabaseToken()
      if(!token){ bodyEl.innerHTML = `<div class="adp-msg">Preview disponível apenas no app autenticado (app.revenuelab.com.br).</div>`; return }
      url = `/api/ad-preview?ad_id=${encodeURIComponent(adId)}&format=${fmt}`
      opts = { headers:{ Authorization:`Bearer ${token}` } }
    }
    try{
      const r = await fetch(url, opts)
      const data = await r.json().catch(()=>({}))
      if(!r.ok){ bodyEl.innerHTML = `<div class="adp-msg">${esc(data?.error?.message||('Erro HTTP '+r.status))}</div>`; return }
      const ifr = document.createElement('iframe')
      ifr.className = 'adp-frame'; ifr.setAttribute('sandbox','allow-scripts allow-popups')
      ifr.srcdoc = data.html || ''
      bodyEl.innerHTML = ''; bodyEl.appendChild(ifr)
    }catch(e){ bodyEl.innerHTML = `<div class="adp-msg">Falha ao carregar o preview.</div>` }
  }
  ov.querySelectorAll('.adp-fmt').forEach(b=>b.onclick=()=>{
    ov.querySelectorAll('.adp-fmt').forEach(x=>x.classList.remove('active')); b.classList.add('active'); load(b.dataset.fmt)
  })
  // Salvar a mídia do anúncio no Banco de Anúncios (vídeo ou imagem)
  // Os blocos abaixo (Banco/transcrição) não são renderizados no modo SHARED —
  // daí o guard: sem ele o null quebraria openAdPreview antes do load() do preview.
  const saveBtn = ov.querySelector('#adpSaveBtn'), saveMsg = ov.querySelector('#adpSaveMsg')
  if (saveBtn) saveBtn.onclick = async ()=>{
    const funil = ov.querySelector('#adpFunil').value
    const from = ov.querySelector('#adpFrom').value, to = ov.querySelector('#adpTo').value
    if(!funil){ saveMsg.textContent='Selecione o funil.'; saveMsg.className='adp-save-msg err'; return }
    if(!from||!to){ saveMsg.textContent='Selecione o período (de/até) dos dados.'; saveMsg.className='adp-save-msg err'; return }
    const token = supabaseToken()
    if(!token){ saveMsg.textContent='Disponível só no app autenticado.'; saveMsg.className='adp-save-msg err'; return }
    saveBtn.disabled=true; saveMsg.textContent='Salvando… (pode levar alguns segundos)'; saveMsg.className='adp-save-msg'
    try{
      const m = adMetricsForRange(adId, from, to)
      const r = await fetch('/api/ad-media', { method:'POST', headers:{ Authorization:`Bearer ${token}`, 'Content-Type':'application/json' },
        body: JSON.stringify({ ad_id:adId, funil, title:adName, account: state.openClient?.client || '',
          ref_from:from, ref_to:to, ...m }) })
      const data = await r.json().catch(()=>({}))
      if(!r.ok) throw new Error(data?.error?.message || ('Erro '+r.status))
      saveMsg.textContent = `✅ Salvo no Banco (${data.type==='video'?'vídeo':'imagem'}) com CTR/Conv/Hook do período!`; saveMsg.className='adp-save-msg ok'
    }catch(e){ saveMsg.textContent='❌ '+e.message; saveMsg.className='adp-save-msg err' }
    finally{ saveBtn.disabled=false }
  }
  // Transcrever o vídeo (Groq) → editar → salvar em "Roteiros Validados" do cliente
  const transBtn = ov.querySelector('#adpTransBtn'), transMsg = ov.querySelector('#adpTransMsg')
  const transText = ov.querySelector('#adpTransText'), transSave = ov.querySelector('#adpTransSave')
  if (transBtn) transBtn.onclick = async ()=>{
    const token = supabaseToken()
    if(!token){ transMsg.textContent='Disponível só no app autenticado.'; transMsg.className='adp-save-msg err'; return }
    transBtn.disabled=true; transMsg.textContent='Transcrevendo… (alguns segundos)'; transMsg.className='adp-save-msg'
    try{
      const r = await fetch('/api/transcribe-ad', { method:'POST', headers:{ Authorization:`Bearer ${token}`, 'Content-Type':'application/json' },
        body: JSON.stringify({ ad_id:adId }) })
      const data = await r.json().catch(()=>({}))
      if(!r.ok) throw new Error(data?.error?.message || ('Erro '+r.status))
      transText.value = data.transcription || ''
      transText.style.display=''; transSave.style.display=''
      transMsg.textContent='✅ Transcrito! Revise o texto e salve nos Roteiros Validados do cliente.'; transMsg.className='adp-save-msg ok'
    }catch(e){ transMsg.textContent='❌ '+e.message; transMsg.className='adp-save-msg err' }
    finally{ transBtn.disabled=false }
  }
  if (transSave) transSave.onclick = async ()=>{
    const token = supabaseToken()
    if(!token){ transMsg.textContent='Disponível só no app autenticado.'; transMsg.className='adp-save-msg err'; return }
    const txt = (transText.value||'').trim()
    if(!txt){ transMsg.textContent='A transcrição está vazia.'; transMsg.className='adp-save-msg err'; return }
    const client = state.openClient?.client || ''
    const projectId = state.accounts[client]?.projectId || null
    if(!projectId){ transMsg.textContent='Este cliente não está vinculado a um projeto na Área do Cliente — não dá pra salvar.'; transMsg.className='adp-save-msg err'; return }
    transSave.disabled=true; transMsg.textContent='Salvando…'; transMsg.className='adp-save-msg'
    try{
      const r = await fetch('/api/roteiros-validados', { method:'POST', headers:{ Authorization:`Bearer ${token}`, 'Content-Type':'application/json' },
        body: JSON.stringify({ action:'create', projectId, ad_id:adId, ad_name:adName, account:client, transcription:txt }) })
      const data = await r.json().catch(()=>({}))
      if(!r.ok) throw new Error(data?.error?.message || ('Erro '+r.status))
      transMsg.textContent='✅ Salvo em Roteiros Validados (Perfil do cliente → Criativos com IA).'; transMsg.className='adp-save-msg ok'
    }catch(e){ transMsg.textContent='❌ '+e.message; transMsg.className='adp-save-msg err' }
    finally{ transSave.disabled=false }
  }
  load(AD_PREVIEW_FORMATS[0][1])
}

// Termos de pesquisa (search_term_view) — só termos com clique. Agrega somáveis
// (impr/clicks/conv/gasto) e RECALCULA razões (CPA/CPC/CTR). Ordena por gasto desc
// ("para onde o dinheiro foi").
const TERMS_PER_PAGE = 50
const TERMS_COLS = [['Termo','termo'],['Impressões','impr'],['Cliques','clicks'],['Conv.','conv'],['Custo/conv.','cpa'],['CPC médio','cpc'],['CTR','ctr']]
function tblGoogleTerms(rows){
  const g = groupBy(rows, r=>r['Termo de pesquisa'], {
    impr:r=>(M(r,'Impressões')||M(r,'Impressões na parte superior')), clicks:r=>(M(r,'CLiques')||M(r,'Cliques')),
    conv:r=>M(r,'Conversões'), spend:r=>M(r,'Gasto') })
  if(!g.length) return `<div class="empty">Sem termos de pesquisa com cliques no período.</div>`
  // Métricas derivadas por termo (razões recalculadas, nunca somadas por linha).
  const items = g.map(x=>({ termo:x.key, impr:x.impr, clicks:x.clicks, conv:x.conv, spend:x.spend,
    cpa: x.conv>0?x.spend/x.conv:null, cpc: x.clicks>0?x.spend/x.clicks:null, ctr: x.impr>0?x.clicks/x.impr*100:null }))
  // Ordenação pela coluna ativa (nulos sempre por último).
  const { key, dir } = state.termsSort, s = dir==='asc'?1:-1
  items.sort((a,b)=>{
    if (key==='termo') return s*String(a.termo).localeCompare(String(b.termo),'pt-BR')
    const av=a[key], bv=b[key]
    if (av==null && bv==null) return 0
    if (av==null) return 1
    if (bv==null) return -1
    return s*(av-bv)
  })
  // Paginação (clampa a página atual ao total).
  const total = items.length, pages = Math.max(1, Math.ceil(total/TERMS_PER_PAGE))
  const page = Math.min(Math.max(0, state.termsPage), pages-1); state.termsPage = page
  const slice = items.slice(page*TERMS_PER_PAGE, page*TERMS_PER_PAGE+TERMS_PER_PAGE)

  const th = TERMS_COLS.map(([label,k])=>{ const a=key===k
    return `<th class="th-sort" data-sortkey="${k}" style="cursor:pointer;user-select:none;white-space:nowrap">${label}${a?(dir==='asc'?' ▲':' ▼'):''}</th>` }).join('')
  const body = slice.map(x=>`<tr><td class="ad-name" title="${esc(x.termo)}">${esc(x.termo)}</td>
    <td>${fmtNum(x.impr)}</td><td>${fmtNum(x.clicks)}</td><td>${convCell(x.conv,x.spend)}</td>
    <td>${x.cpa!=null?fmtMoney(x.cpa):'—'}</td><td>${x.cpc!=null?fmtMoney(x.cpc):'—'}</td><td>${ctrCell(x.ctr)}</td></tr>`).join('')

  const from = total?page*TERMS_PER_PAGE+1:0, to = Math.min(total, (page+1)*TERMS_PER_PAGE)
  const pgBtn = (d,lbl,dis)=>`<button data-pg="${d}" ${dis?'disabled':''} style="border:1px solid #D8E0F0;background:#fff;color:#334155;border-radius:6px;min-width:28px;height:28px;font-size:15px;line-height:1;cursor:${dis?'default':'pointer'};${dis?'opacity:.4':''}">${lbl}</button>`
  const pager = `<div class="terms-pager" style="display:flex;align-items:center;justify-content:flex-end;gap:10px;padding:10px 2px 2px;font-size:12px;color:#64748B">
    <span>${from}–${to} de ${total} termo${total!==1?'s':''}</span>
    ${pgBtn('prev','‹',page<=0)}<span>${page+1}/${pages}</span>${pgBtn('next','›',page>=pages-1)}</div>`
  return `<div class="dt-wrap"><table><thead><tr>${th}</tr></thead><tbody>${body}</tbody></table></div>${pager}`
}

// ─── Métricas agregadas (Custos / Engajamento / Performance) ──────────────────
// Espelha aggMetrics/MetricGroups do ClientPage, mas com conversões = coluna
// "Conversões" (semântica dos dados via API).
function aggMetrics(rows, isMeta) {
  if (isMeta) {
    const spend = rows.reduce((a,r)=>a+num(r['Valor investido']),0)
    const impressions = rows.reduce((a,r)=>a+num(r['Impressões']),0)
    const clicks = rows.reduce((a,r)=>a+num(r['Número de cliques no link']),0)
    const conv = rows.reduce((a,r)=>a+num(r['Conversões']),0)
    // Engajamento social: compartilhamentos do post + seguidores/curtidas ganhos.
    const shares = rows.reduce((a,r)=>a+num(r['Compartilhamentos']),0)
    const follows = rows.reduce((a,r)=>a+num(r['Seguidores ganhos']),0)
    const fRows = rows.filter(r=>num(r['Frequência'])>0 && num(r['Impressões'])>0)
    const fImps = fRows.reduce((a,r)=>a+num(r['Impressões']),0)
    const frequency = fImps>0 ? fRows.reduce((a,r)=>a+num(r['Frequência'])*num(r['Impressões']),0)/fImps : null
    // Compras / Custo por compra / ROAS (Meta). "Número de vendas" é somável;
    // "ROAS de vendas" é razão por linha → agrega como receita (ROAS×gasto) ÷ gasto.
    const purchases = rows.reduce((a,r)=>a+num(r['Número de vendas']),0)
    const revenue = rows.reduce((a,r)=>a+num(r['ROAS de vendas'])*num(r['Valor investido']),0)
    // Conversão custom MQL (ex.: Grupo AJ = mql_aj, GoVendas = mql_go): conta o
    // resultado das linhas cujo "Tipo de resultado" é MQL e a taxa de avanço
    // Lead→MQL (MQL ÷ Leads do escopo). Substitui o bloco de Compras quando há MQL.
    // MQL: usa a coluna "MQL" (conversão secundária, ex.: Matheus Business=mql) e,
    // em fallback, as linhas cujo Tipo de resultado é MQL (override, ex.: Grupo AJ).
    const leads = rows.reduce((a,r)=>a+num(r['Leads']),0)
    const colMql = rows.reduce((a,r)=>a+num(r['MQL']),0)
    const typeRows = rows.filter(r => /mql/i.test(r['Tipo de resultado'] || ''))
    const mql = colMql > 0 ? colMql : typeRows.reduce((a,r)=>a+num(r['Conversões']),0)
    const mqlSpend = colMql > 0 ? spend : typeRows.reduce((a,r)=>a+num(r['Valor investido']),0)
    const mqlLabel = colMql > 0 ? 'MQL' : (typeRows.length ? (typeRows[0]['Tipo de resultado'] || 'MQL') : 'MQL')
    const hasMql = colMql > 0 || typeRows.length > 0
    return { spend, impressions, clicks, conv, shares, follows, cpm:impressions>0?spend/impressions*1000:null, ctr:impressions>0?clicks/impressions*100:null, cpl:conv>0?spend/conv:null, convRate:clicks>0?conv/clicks*100:null, frequency,
      purchases, cpp:purchases>0?spend/purchases:null, revenue, roas:spend>0?revenue/spend:null,
      hasMql, mql, leads, mqlLabel, cpMql:mql>0?mqlSpend/mql:null, leadToMql:leads>0?mql/leads*100:null }
  }
  const spend = rows.reduce((a,r)=>a+num(r['Gasto']),0)
  const clicks = rows.reduce((a,r)=>a+(num(r['CLiques'])||num(r['Cliques'])),0)
  const conv = rows.reduce((a,r)=>a+num(r['Conversões']),0)
  const impressions = rows.reduce((a,r)=>a+(num(r['Impressões na parte superior'])||num(r['Impressões'])),0)
  return { spend, impressions, clicks, conv, cpc:clicks>0?spend/clicks:null, cpm:impressions>0?spend/impressions*1000:null, ctr:impressions>0?clicks/impressions*100:null, cpl:conv>0?spend/conv:null, convRate:clicks>0?conv/clicks*100:null }
}
function pctVar(cur, prev) {
  if (cur==null && prev==null) return null
  if (prev==null || prev===0) return (cur!=null && cur>0) ? 100 : null
  if (cur==null) return -100
  return ((cur-prev)/prev)*100
}
function tileHTML(label, value, variance, inverted) {
  const arrow = variance==null?'' : variance>0.05?'▲' : variance<-0.05?'▼' : '•'
  const cls = variance==null?'fl' : varCls(variance, inverted)
  return `<div class="mg-tile"><div class="mg-tile-label">${label}</div><div class="mg-tile-value">${value}</div><div class="mg-tile-var ${cls}"><span class="mg-arrow">${arrow}</span>${variance==null?'—':fmtPct(variance)}</div></div>`
}
function metricGroupsHTML(allRows, prevRows, isMeta, period) {
  if (!allRows.length) return ''
  const cur = aggMetrics(allRows, isMeta), prv = aggMetrics(prevRows, isMeta)
  // Mini-gráfico por quadrante (só quando period é passado — aba Resultados).
  const chart = id => period ? `<div class="mg-chart"><canvas id="${id}"></canvas></div>` : ''
  return `<div class="mg-grid">
    <div class="mg-card mg-cost"><h4 class="mg-title">Custos</h4><div class="mg-tiles">
      ${tileHTML('Gasto', fmtMoney(cur.spend), pctVar(cur.spend, prv.spend), false)}
      ${isMeta ? tileHTML('Frequência', fmtFreq(cur.frequency), pctVar(cur.frequency, prv.frequency), true)
               : tileHTML('CPC', fmtMoney(cur.cpc), pctVar(cur.cpc, prv.cpc), true)}
      ${tileHTML('CPM', fmtMoney(cur.cpm), pctVar(cur.cpm, prv.cpm), true)}
    </div>${chart('mgChartCost')}</div>
    <div class="mg-card mg-eng"><h4 class="mg-title">Engajamento</h4><div class="mg-tiles">
      ${tileHTML('CTR', fmtPctVal(cur.ctr), pctVar(cur.ctr, prv.ctr), false)}
      ${tileHTML('Cliques', fmtInt(cur.clicks), pctVar(cur.clicks, prv.clicks), false)}
      ${tileHTML('Impressões', fmtInt(cur.impressions), pctVar(cur.impressions, prv.impressions), false)}
      ${isMeta ? `
      ${tileHTML('Seguidores ganhos', fmtInt(cur.follows), pctVar(cur.follows, prv.follows), false)}
      ${tileHTML('Compartilhamentos', fmtInt(cur.shares), pctVar(cur.shares, prv.shares), false)}` : ''}
    </div>${chart('mgChartEng')}</div>
    <div class="mg-card mg-perf"><h4 class="mg-title">Performance</h4><div class="mg-tiles">
      ${tileHTML('Conversões', fmtInt(cur.conv), pctVar(cur.conv, prv.conv), false)}
      ${tileHTML(isMeta?'CPL':'CPA', fmtMoney(cur.cpl), pctVar(cur.cpl, prv.cpl), true)}
      ${tileHTML('Taxa de conv.', fmtPctVal(cur.convRate), pctVar(cur.convRate, prv.convRate), false)}
      ${isMeta ? (cur.hasMql ? `
      ${tileHTML(esc(cur.mqlLabel), fmtInt(cur.mql), pctVar(cur.mql, prv.mql), false)}
      ${tileHTML('Custo por MQL', fmtMoney(cur.cpMql), pctVar(cur.cpMql, prv.cpMql), true)}
      ${tileHTML('Avanço Lead→MQL', fmtPctVal(cur.leadToMql), pctVar(cur.leadToMql, prv.leadToMql), false)}` : `
      ${tileHTML('Compras', fmtInt(cur.purchases), pctVar(cur.purchases, prv.purchases), false)}
      ${tileHTML('Custo/compra', fmtMoney(cur.cpp), pctVar(cur.cpp, prv.cpp), true)}
      ${tileHTML('Valor compras', fmtMoneyShort(cur.revenue), pctVar(cur.revenue, prv.revenue), false)}
      ${tileHTML('ROAS', cur.roas!=null?cur.roas.toFixed(2).replace('.',',')+'x':'—', pctVar(cur.roas, prv.roas), false)}`) : ''}
    </div>${chart('mgChartPerf')}</div>
  </div>`
}

// ─── Insights IA (diagnóstico + plano de ação) — espelha ClientPage ───────────
function buildInsights(stats, channel, allRows, target) {
  if (!stats || !allRows.length) return null
  const s = stats, isMeta = channel === 'meta'
  const adNameKey = isMeta ? 'Nome do Anúncio' : 'Campanha'
  const adStatusKey = isMeta ? 'Status do Aúncio' : null
  const groups = groupBy(allRows, r => r[adNameKey], {
    spend: r => isMeta ? num(r['Valor investido']) : num(r['Gasto']),
    conv: r => num(r['Conversões']),
    clicks: r => isMeta ? num(r['Número de cliques no link']) : (num(r['CLiques']) || num(r['Cliques'])),
    impressions: r => isMeta ? num(r['Impressões']) : (num(r['Impressões na parte superior']) || num(r['Impressões'])),
  })
  const wasters = groups.filter(g => {
    if (g.conv > 0 || g.spend < 35) return false
    if (!isMeta) return true
    return !(g._rows[0]?.[adStatusKey] || '').toLowerCase().includes('paus')
  }).sort((a, b) => b.spend - a.spend).slice(0, 3)
  const totalWaste = wasters.reduce((a, g) => a + g.spend, 0)
  const performers = groups.filter(g => g.conv > 0).map(g => ({ ...g, cpl: g.spend / g.conv }))
  const topPerformer = performers.length ? performers.sort((a, b) => a.cpl - b.cpl)[0] : null
  const totalClicks = groups.reduce((a, g) => a + g.clicks, 0)
  const totalImps = groups.reduce((a, g) => a + g.impressions, 0)
  const totalConv = groups.reduce((a, g) => a + g.conv, 0)
  const aggCtr = totalImps > 0 ? totalClicks / totalImps * 100 : null
  const aggConvRate = totalClicks > 0 ? totalConv / totalClicks * 100 : null
  const benchCtr = isMeta ? 1 : 5
  const ctrBad = aggCtr != null && aggCtr < (isMeta ? 0.5 : 2)
  const convRateBad = aggConvRate != null && aggConvRate < (isMeta ? 20 : 5)
  const overTarget = target && s.cpl1 && s.cpl1 > target.value
  const overTargetPct = overTarget ? ((s.cpl1 - target.value) / target.value * 100) : 0

  let diagnosis
  if (s.status === 'CRÍTICO') diagnosis = '🔴 CRÍTICO: 0 conversões no período. Conta praticamente parada — investigar urgentemente.'
  else if (s.status === 'QUEDA') {
    const parts = []
    if (s.varConv < -10) parts.push(`conversões caíram ${Math.abs(s.varConv).toFixed(0)}%`)
    if (s.varCpl != null && s.varCpl > 15) parts.push(`CPL subiu ${s.varCpl.toFixed(0)}%`)
    diagnosis = `🔴 QUEDA: ${parts.join(' e ') || 'piora detectada'} vs período anterior.`
  } else if (s.status === 'MELHORA') {
    const parts = []
    if (s.varConv > 10) parts.push(`conversões subiram ${s.varConv.toFixed(0)}%`)
    if (s.varCpl != null && s.varCpl < -10) parts.push(`CPL caiu ${Math.abs(s.varCpl).toFixed(0)}%`)
    diagnosis = `🟢 MELHORA: ${parts.join(' e ') || 'evolução positiva'} vs período anterior.`
  } else diagnosis = '🟡 ESTÁVEL: variações dentro da normalidade.'
  if (s.declining3d && s.status !== 'CRÍTICO') diagnosis += ' ⚠️ Tendência negativa nos últimos 3 dias.'

  const plan = []
  if (wasters.length) plan.push({ level: 'URGENTE', action: `Pausar ${wasters.length} ${isMeta ? 'anúncio(s)' : 'campanha(s)'} sem conversão — economiza R$ ${totalWaste.toFixed(2)}` })
  if (s.declining3d && s.status !== 'CRÍTICO') plan.push({ level: 'URGENTE', action: 'Conversões em queda 3 dias seguidos — revisar criativos e segmentação imediatamente' })
  if (s.status === 'CRÍTICO') plan.push({ level: 'URGENTE', action: 'Auditar tracking, públicos e criativos — verificar se há bloqueio na entrega' })
  if (ctrBad) plan.push({ level: 'ALTA', action: `CTR ${aggCtr.toFixed(2)}% bem abaixo do benchmark (${benchCtr}%) — renovar criativos e copy` })
  if (convRateBad) plan.push({ level: 'ALTA', action: `Taxa de conversão ${aggConvRate.toFixed(1)}% baixa — revisar landing page / oferta / qualidade do lead` })
  if (overTarget && overTargetPct > 30) plan.push({ level: 'ALTA', action: `CPL ${overTargetPct.toFixed(0)}% acima do alvo (R$ ${target.value}) — diagnosticar causa raiz` })
  if (topPerformer && target && topPerformer.cpl < target.value * 0.8) plan.push({ level: 'MÉDIA', action: `Escalar "${topPerformer.key}" — CPL R$ ${topPerformer.cpl.toFixed(2)} (${((target.value - topPerformer.cpl) / target.value * 100).toFixed(0)}% abaixo do alvo)` })
  if (s.varConv >= 20) plan.push({ level: 'MÉDIA', action: `Conversões subiram ${s.varConv.toFixed(0)}% — entender o que mudou e replicar` })
  if (!plan.length) plan.push({ level: 'MÉDIA', action: 'Performance estável — manter monitoramento e testar novos criativos' })

  return { diagnosis, wasters, totalWaste, topPerformer, aggCtr, aggConvRate, benchCtr, plan, target, overTarget, overTargetPct, isMeta }
}
function insightsCardHTML(ins, periodLabel, cpl1) {
  if (!ins) return ''
  const priCls = { 'URGENTE':'ins-pri-urgent', 'ALTA':'ins-pri-high', 'MÉDIA':'ins-pri-med' }
  const ctrThreshold = ins.isMeta ? 1 : 5
  const convThreshold = ins.isMeta ? 20 : 5
  const planRows = ins.plan.map(p=>`<div class="ins-plan-row ${priCls[p.level]}"><span class="ins-plan-pri">${p.level}</span><span class="ins-plan-action">${esc(p.action)}</span></div>`).join('')
  const wastersSec = ins.wasters.length ? `<div class="ins-section">
      <div class="ins-section-title">🚨 Torrando dinheiro</div>
      <div class="ins-section-sub">R$ ${ins.totalWaste.toFixed(2)} desperdiçados em ${ins.wasters.length} ${ins.isMeta?'anúncio(s)':'campanha(s)'}</div>
      ${ins.wasters.map(w=>`<div class="ins-item"><span class="ins-item-name" title="${esc(w.key)}">${esc(w.key)}</span><span class="ins-item-val ins-bad">R$ ${w.spend.toFixed(2)}</span></div>`).join('')}
    </div>` : ''
  const topSec = ins.topPerformer ? `<div class="ins-section">
      <div class="ins-section-title">🏆 Top performer</div>
      <div class="ins-section-sub">Menor CPL com conversão</div>
      <div class="ins-item"><span class="ins-item-name" title="${esc(ins.topPerformer.key)}">${esc(ins.topPerformer.key)}</span><span class="ins-item-val ins-good">CPL R$ ${ins.topPerformer.cpl.toFixed(2)}</span></div>
      <div class="ins-item"><span class="ins-item-name">Conversões</span><span class="ins-item-val">${fmtNum(ins.topPerformer.conv)}</span></div>
    </div>` : ''
  const benchSec = `<div class="ins-section">
      <div class="ins-section-title">📊 Benchmarks</div>
      <div class="ins-section-sub">vs Revenue Lab</div>
      ${ins.aggCtr!=null?`<div class="ins-item"><span class="ins-item-name">CTR ${ins.isMeta?'Link':'Search'}</span><span class="ins-item-val ${ins.aggCtr>=ctrThreshold?'ins-good':ins.aggCtr<ctrThreshold*0.5?'ins-bad':'ins-warn'}">${ins.aggCtr.toFixed(2)}% (alvo ≥${ctrThreshold}%)</span></div>`:''}
      ${ins.aggConvRate!=null?`<div class="ins-item"><span class="ins-item-name">Tx. conversão</span><span class="ins-item-val ${ins.aggConvRate>=convThreshold?'ins-good':'ins-warn'}">${ins.aggConvRate.toFixed(1)}%</span></div>`:''}
      ${ins.target?`<div class="ins-item"><span class="ins-item-name">CPL vs alvo</span><span class="ins-item-val ${!ins.overTarget?'ins-good':ins.overTargetPct>30?'ins-bad':'ins-warn'}">${cpl1?fmtMoney(cpl1):'—'}${ins.overTarget?` (+${ins.overTargetPct.toFixed(0)}%)`:''}</span></div>`:''}
    </div>`
  return `<div class="ins-card">
    <div class="ins-header"><span class="ins-icon">🤖</span><span class="ins-title">Análise IA — Revenue Lab</span><span class="ins-meta">${esc(periodLabel)}</span></div>
    <div class="ins-diag">${esc(ins.diagnosis)}</div>
    <div class="ins-plan"><div class="ins-plan-title">🎯 Plano de ação</div>${planRows}</div>
    <div class="ins-grid" style="margin-top:14px;margin-bottom:0">${wastersSec}${topSec}${benchSec}</div>
  </div>`
}

// ─── Charts (investimento + conversões: atual vs anterior) ────────────────────
const cplActualCls = (actualCpl, target) => {
  if (!target || !actualCpl) return ''
  if (actualCpl <= target.value) return 'cpl-ok'
  if (actualCpl <= target.value * 1.3) return 'cpl-warn'
  return 'cpl-bad'
}
const chartBaseOptions = (yFmt) => ({
  responsive: true, maintainAspectRatio: false,
  plugins: { legend: { labels: { color: '#334155', font: { size: 10 } } }, tooltip: { mode: 'index', intersect: false } },
  scales: {
    x: { ticks: { color: '#64748B', font: { size: 9 }, maxRotation: 45 }, grid: { color: '#E4EAF7' } },
    y: { ticks: { color: '#64748B', font: { size: 9 }, callback: yFmt }, grid: { color: '#E4EAF7' }, beginAtZero: true },
  },
})
function buildChartData(period, allRows, prevRows, channel) {
  const isMeta = channel === 'meta'
  const spendKey = isMeta ? 'Valor investido' : 'Gasto'
  const days = [], spends = [], convs = [], spendsPrev = [], convsPrev = []
  const sumDay = (rows, d) => {
    const dr = rows.filter(r => fmtDate(r[CFG[channel].dateKey]) === d)
    return { spend: dr.reduce((a, r) => a + num(r[spendKey]), 0), conv: dr.reduce((a, r) => a + num(r['Conversões']), 0) }
  }
  for (let i = period.span; i >= 0; i--) {
    const d = addDays(period.p1e, -i), dPrev = addDays(period.p2e, -i)
    const c = sumDay(allRows, d), pv = sumDay(prevRows, dPrev)
    days.push(fmtBR(d))
    spends.push(parseFloat(c.spend.toFixed(2))); convs.push(c.conv)
    spendsPrev.push(parseFloat(pv.spend.toFixed(2))); convsPrev.push(pv.conv)
  }
  return {
    line: { labels: days, datasets: [
      { label: 'Atual (R$)', data: spends, borderColor: '#D97706', backgroundColor: 'rgba(217,119,6,0.12)', tension: 0.35, fill: true, pointRadius: 2, pointHoverRadius: 5, order: 1 },
      { label: 'Anterior (R$)', data: spendsPrev, borderColor: '#94A3B8', backgroundColor: 'transparent', borderDash: [5, 4], tension: 0.35, fill: false, pointRadius: 0, pointHoverRadius: 4, borderWidth: 1.5, order: 2 },
    ] },
    bar: { labels: days, datasets: [
      { label: 'Atual', data: convs, borderColor: '#2563EB', backgroundColor: 'rgba(37,99,235,0.12)', tension: 0.35, fill: true, pointRadius: 2, pointHoverRadius: 5, order: 1 },
      { label: 'Anterior', data: convsPrev, borderColor: '#94A3B8', backgroundColor: 'transparent', borderDash: [5, 4], tension: 0.35, fill: false, pointRadius: 0, pointHoverRadius: 4, borderWidth: 1.5, order: 2 },
    ] },
  }
}

// Mini-gráficos dos quadrantes (aba Resultados): Custos=gasto, Engajamento=CTR
// no link, Performance=resultado principal (Conversões) + secundário (MQL, quando
// houver). Séries diárias ao longo do período selecionado.
function initQuadrantCharts(period, rows, channel, isMeta) {
  if (typeof Chart === 'undefined' || !period || !rows.length) return
  const dateKey = CFG[channel].dateKey
  const spendKey = isMeta ? 'Valor investido' : 'Gasto'
  const days=[], spend=[], ctr=[], conv=[], mql=[]
  for (let i=period.span; i>=0; i--) {
    const d = addDays(period.p1e, -i)
    const dr = rows.filter(r => fmtDate(r[dateKey]) === d)
    days.push(fmtBR(d))
    const imp = dr.reduce((a,r)=>a+(isMeta?num(r['Impressões']):(num(r['Impressões na parte superior'])||num(r['Impressões']))),0)
    const clk = dr.reduce((a,r)=>a+(isMeta?num(r['Número de cliques no link']):(num(r['CLiques'])||num(r['Cliques']))),0)
    spend.push(parseFloat(dr.reduce((a,r)=>a+num(r[spendKey]),0).toFixed(2)))
    ctr.push(imp>0?parseFloat((clk/imp*100).toFixed(2)):0)
    conv.push(dr.reduce((a,r)=>a+num(r['Conversões']),0))
    const dColMql = dr.reduce((a,r)=>a+num(r['MQL']),0)
    mql.push(dColMql>0 ? dColMql : dr.filter(r=>/mql/i.test(r['Tipo de resultado']||'')).reduce((a,r)=>a+num(r['Conversões']),0))
  }
  const hasMql = mql.some(v=>v>0)
  const opts = (yFmt) => ({
    responsive:true, maintainAspectRatio:false,
    layout:{ padding:{ top:2, right:6 } },
    interaction:{ mode:'index', intersect:false },
    plugins:{ legend:{ display:true, position:'top', align:'start', labels:{ color:'#334155', font:{size:11, weight:'600'}, boxWidth:18, boxHeight:2, padding:8 } }, tooltip:{ mode:'index', intersect:false } },
    scales:{ x:{ ticks:{ color:'#64748B', font:{size:10}, maxRotation:0, autoSkip:true, maxTicksLimit:8 }, grid:{ display:false } },
             y:{ ticks:{ color:'#64748B', font:{size:10}, callback:yFmt, maxTicksLimit:5 }, grid:{ color:'#E4EAF7' }, beginAtZero:true } },
  })
  const mk = (id, datasets, yFmt) => { const el=document.getElementById(id); if(!el) return
    state._charts.push(new Chart(el.getContext('2d'), { type:'line', data:{ labels:days, datasets }, options: opts(yFmt) })) }
  const ds = (label, data, color) => ({ label, data, borderColor:color, backgroundColor:'transparent', fill:false, tension:0.3, pointRadius:0, pointHoverRadius:4, borderWidth:2.5 })
  mk('mgChartCost', [ds('Gasto', spend, '#D97706')], v=>'R$'+v)
  mk('mgChartEng', [ds('CTR no link', ctr, '#0891B2')], v=>v+'%')
  const perf = [ds('Conversões', conv, '#2563EB')]
  if (hasMql) perf.push({ ...ds('MQL', mql, '#7C3AED'), borderDash:[5,4] })
  mk('mgChartPerf', perf, v=>v)
}

// ─── Aba CAMPANHAS (insights + sub-abas/drill) ────────────────────────────────
function campanhasHTML(allRows, prevRows, channel, stats, target, periodLabel, period) {
  const isMeta = channel === 'meta'
  if (!allRows.length) return `<div class="cp-panel"><div class="empty">Sem dados no período.</div></div>`
  // Quadrantes (Custos / Engajamento / Performance) escopados ao nível atual do
  // drill: conta inteira no topo, campanha ao entrar numa campanha, conjunto ao
  // entrar num conjunto. Reaproveita metricGroupsHTML da aba Resultados.
  let qCur = allRows, qPrev = prevRows, scopeLabel = 'Conta — todas as campanhas'
  if (isMeta && state.drillAdset) {
    qCur = allRows.filter(r=>r['Conjunto de Anúncio']===state.drillAdset)
    qPrev = prevRows.filter(r=>r['Conjunto de Anúncio']===state.drillAdset)
    const ativos = activeAdsCount(qCur)
    scopeLabel = `Conjunto: ${state.drillAdset} · ${ativos} anúncio${ativos!==1?'s':''} ativo${ativos!==1?'s':''}`
  } else if (state.drillCampaign) {
    const ck = isMeta ? 'Nome da campanha' : 'Campanha'
    qCur = allRows.filter(r=>r[ck]===state.drillCampaign)
    qPrev = prevRows.filter(r=>r[ck]===state.drillCampaign)
    scopeLabel = `Campanha: ${state.drillCampaign}`
  }
  const quad = `<div class="cp-quad-scope">📐 ${esc(scopeLabel)}</div>${metricGroupsHTML(qCur, qPrev, isMeta, period)}`
  // Drill dentro da aba
  if (state.drillCampaign || state.drillAdset) {
    let body, bc
    if (isMeta && state.drillAdset) {
      body = tblMetaAds(allRows.filter(r=>r['Conjunto de Anúncio']===state.drillAdset),
                        prevRows.filter(r=>r['Conjunto de Anúncio']===state.drillAdset))
      bc = `<div class="breadcrumb"><button class="bc-back" id="bcBack" style="margin-right:4px">← Voltar</button>
        <span class="bc-item" data-bc="root">Campanhas</span><span class="bc-sep">›</span>
        <span class="bc-item" data-bc="camp">${esc(state.drillCampaign)}</span><span class="bc-sep">›</span><span class="bc-current">${esc(state.drillAdset)}</span></div>`
    } else {
      body = isMeta ? tblMetaAdsets(allRows.filter(r=>r['Nome da campanha']===state.drillCampaign),
                                    prevRows.filter(r=>r['Nome da campanha']===state.drillCampaign))
                    : tblGoogleGroups(allRows.filter(r=>r['Campanha']===state.drillCampaign),
                                      prevRows.filter(r=>r['Campanha']===state.drillCampaign))
      bc = `<div class="breadcrumb"><button class="bc-back" id="bcBack" style="margin-right:4px">← Voltar</button>
        <span class="bc-item" data-bc="root">Campanhas</span><span class="bc-sep">›</span><span class="bc-current">${esc(state.drillCampaign)}</span></div>`
    }
    return `<div class="cp-panel">${bc}${quad}${body}</div>`
  }
  // O card de Análise IA (diagnóstico + plano de ação) é uso interno: no link
  // compartilhado o cliente não vê nem o card nem o cálculo por trás dele.
  const ins = SHARED ? null : buildInsights(stats, channel, allRows, target)
  const tabs = isMeta ? [['📊 Campanhas',0],['🎯 Conjuntos',1],['🎨 Anúncios',2]] : [['📊 Campanhas',0],['🔑 Grupos',1],['🔎 Termos',2]]
  let panel
  // Termos (Google, sub===2) é preenchido async por renderGoogleTerms (lazy/por conta).
  if (isMeta) panel = state.sub===1?tblMetaAdsets(allRows,prevRows):state.sub===2?tblMetaAds(allRows,prevRows):tblMetaCampaigns(allRows,prevRows)
  else        panel = state.sub===2?`<div id="termsPanel"></div>`:state.sub===1?tblGoogleGroups(allRows,prevRows):tblGoogleCampaigns(allRows,prevRows)
  return `<div class="cp-panel">
    ${quad}
    <div class="dt-subtabs">
      ${tabs.map(([l,i])=>`<div class="dtab${state.sub===i?' active':''}" data-sub="${i}">${l}</div>`).join('')}
    </div>
    ${panel}
    ${insightsCardHTML(ins, periodLabel, stats?.cpl1)}
  </div>`
}

// Preenche o painel de Termos (lazy/por conta, cacheado por cliente). Espelha o
// padrão das abas async (renderAtividades/renderParametros).
async function renderGoogleTerms(container, client, period) {
  if (!container) return
  if (!state.termsCache[client]) {
    container.innerHTML = `<div class="empty"><div class="spinner" style="margin:0 auto 12px"></div><p>Carregando termos de pesquisa…</p></div>`
    try {
      const csv = await fetchGoogleTerms(client)
      state.termsCache[client] = parseCSV(csv)
    } catch (e) {
      container.innerHTML = `<div class="empty">Erro ao carregar termos: ${esc(e.message)}</div>`
      return
    }
  }
  // Filtra a conta (no dev o CSV traz todas) + período selecionado no viewer.
  const rows = state.termsCache[client].filter(r =>
    (r['Nome da conta']||'').trim()===client &&
    inRange(fmtDate(r['Data']), period.p1s, period.p1e))
  // Re-renderiza do mesmo conjunto filtrado (sem refetch) ao ordenar/paginar.
  const draw = () => {
    container.innerHTML = tblGoogleTerms(rows)
    container.querySelectorAll('th.th-sort').forEach(th => th.onclick = () => {
      const k = th.dataset.sortkey
      if (state.termsSort.key === k) state.termsSort = { key:k, dir: state.termsSort.dir==='asc'?'desc':'asc' }
      else state.termsSort = { key:k, dir: k==='termo'?'asc':'desc' }
      state.termsPage = 0; draw()
    })
    const prev = container.querySelector('[data-pg="prev"]'), next = container.querySelector('[data-pg="next"]')
    if (prev) prev.onclick = () => { state.termsPage = Math.max(0, state.termsPage-1); draw() }
    if (next) next.onclick = () => { state.termsPage = state.termsPage+1; draw() }
  }
  draw()
}

// ─── Aba ATIVIDADES (ClickUp via /api/clickup-proxy) ──────────────────────────
async function fetchClickupJson(url) {
  const res = await fetch(url)
  const text = await res.text()
  let data
  try { data = JSON.parse(text) } catch {
    throw new Error('A API de atividades não está disponível neste ambiente. Rode o app com `vercel dev` (porta 3000) — `npm run dev` não serve as rotas /api.')
  }
  if (!res.ok) throw new Error(data?.error || `Erro HTTP ${res.status}`)
  if (data.err) throw new Error(data.err)
  return data
}
async function renderAtividades(container, client, folderId) {
  if (!folderId) {
    container.innerHTML = `<div class="cp-panel"><div class="empty" style="padding:32px 20px">
      <div style="margin-bottom:14px;font-size:14px">Nenhuma pasta ClickUp vinculada a este cliente.</div>
      <div style="font-size:12px;color:#94A3B8;margin-bottom:16px">Vincule o cliente a um projeto da Área do Cliente (com pasta ClickUp) no dashboard oficial.</div>
    </div></div>`
    return
  }
  container.innerHTML = `<div class="cp-panel"><div class="empty"><div class="spinner" style="margin:0 auto 12px"></div><p>Carregando atividades do ClickUp…</p></div></div>`
  try {
    const listsData = await fetchClickupJson(`/api/clickup-proxy?path=folder/${folderId}/list`)
    const lists = listsData.lists || []
    const geral = lists.find(l => l.name?.toLowerCase()==='geral') || lists[0]
    if (!geral) { container.innerHTML = `<div class="cp-panel"><div class="empty">Lista "Geral" não encontrada nesta pasta ClickUp.<br><small>Pastas disponíveis: ${lists.map(l=>esc(l.name)).join(', ')}</small></div></div>`; return }
    const tasksData = await fetchClickupJson(`/api/clickup-proxy?path=list/${geral.id}/task&subtasks=true&include_closed=true&page=0`)
    const tasks = tasksData.tasks || []

    const isClosed = t => { const st=(t.status?.status||'').toLowerCase(); return t.status?.type==='closed' || ['complete','done','concluído','concluida','closed'].includes(st) }
    const closed = tasks.filter(isClosed)
    const open = tasks.filter(t=>!isClosed(t))
    const total = tasks.length
    const pct = total>0 ? Math.round(closed.length/total*100) : 0
    const today = Date.now()
    const fmtDue = ts => { if(!ts) return null; const ms=parseInt(ts); const d=new Date(ms); const diff=Math.ceil((ms-today)/86400000); return { str:d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'}), overdue:diff<0, diff } }
    const buckets = { atrasoMaisSemana:[], atrasoAteSemana:[], hoje:[], proximosSete:[], semData:[] }
    open.forEach(t=>{
      if(!t.due_date){ buckets.semData.push(t); return }
      const diff = fmtDue(t.due_date).diff
      if(diff<-7) buckets.atrasoMaisSemana.push(t)
      else if(diff<0) buckets.atrasoAteSemana.push(t)
      else if(diff===0) buckets.hoje.push(t)
      else buckets.proximosSete.push(t)
    })
    const sortByDue = (a,b)=>parseInt(a.due_date)-parseInt(b.due_date)
    Object.values(buckets).forEach(arr=>arr.sort(sortByDue))
    const recentClosed = [...closed].sort((a,b)=>parseInt(b.date_closed||b.date_updated||0)-parseInt(a.date_closed||a.date_updated||0)).slice(0,10)

    const taskHTML = t => {
      const done=isClosed(t), due=t.due_date?fmtDue(t.due_date):null
      const sc=t.status?.color||'#94A3B8', sn=t.status?.status||''
      return `<div class="cu-task${done?' cu-task-done':''}">
        <span class="cu-check">${done?'✅':'⬜'}</span>
        <div class="cu-task-name">${esc(t.name)}</div>
        ${sn?`<span class="cu-status-badge" style="background:${sc}22;color:${sc};border:1px solid ${sc}44">${esc(sn)}</span>`:''}
        ${due?`<span class="cu-due${due.overdue?' overdue':''}">${due.overdue?'⚠️ ':''}${due.str}</span>`:''}
      </div>`
    }
    const bucketHTML = (title, arr) => arr.length ? `<div class="cu-section-title">${title} (${arr.length})</div>${arr.map(taskHTML).join('')}` : ''
    const openHTML = open.length ? `
        ${bucketHTML('🚨 Atraso de mais de 1 semana', buckets.atrasoMaisSemana)}
        ${bucketHTML('⚠️ Atraso de até 7 dias', buckets.atrasoAteSemana)}
        ${bucketHTML('📅 Hoje', buckets.hoje)}
        ${bucketHTML('🗓️ Vencimento nos próximos 7 dias', buckets.proximosSete)}
        ${bucketHTML('📌 Sem data definida', buckets.semData)}`
      : `<div class="cu-section-title">📋 Em aberto</div><div class="cu-task"><span class="cu-check">🎉</span><div class="cu-task-name">Nenhuma tarefa em aberto!</div></div>`
    const closedHTML = recentClosed.length ? `<div class="cu-section-title">✅ Concluídas recentes (${recentClosed.length})</div>${recentClosed.map(taskHTML).join('')}` : ''
    container.innerHTML = `<div class="cp-panel">
      <div class="cu-progress-wrap">
        <div class="cu-progress-label">${closed.length} de ${total} tarefas concluídas (${pct}%) — lista <b>${esc(geral.name)}</b></div>
        <div class="cu-progress"><div class="cu-progress-bar" style="width:${pct}%"></div></div>
      </div>
      ${openHTML}
      ${closedHTML}
    </div>`
  } catch (err) {
    container.innerHTML = `<div class="cp-panel"><div class="error-box">⚠️ Erro ao carregar atividades: ${esc(err.message)}</div></div>`
  }
}
